name: Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag_name: ${{ steps.extract_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag
        id: extract_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_HASH=$(git rev-parse --short HEAD)
            TAG="dev-${COMMIT_HASH}-$(date +%Y%m%d%H%M%S)"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.extract_tag.outputs.tag }}';
            const changelogPath = 'CHANGELOG.md';

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            let body = '';

            if (fs.existsSync(changelogPath)) {
              const changelog = fs.readFileSync(changelogPath, 'utf8').replace(/\r\n/g, '\n');
              const escapedTag = escapeRegExp(tag);
              const headingPattern = new RegExp(`^##\\s+\\[?${escapedTag}\\]?\\s*(?:-.*)?$`, 'm');
              const heading = changelog.match(headingPattern);

              if (heading) {
                const sectionStart = heading.index + heading[0].length;
                const sectionRest = changelog.slice(sectionStart);
                const nextSectionIndex = sectionRest.search(/^##\\s+/m);
                body = sectionRest
                  .slice(0, nextSectionIndex === -1 ? undefined : nextSectionIndex)
                  .trim();
              }
            }

            if (!body) {
              body = `No CHANGELOG.md entry found for ${tag}.`;
            }

            return { body };

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_tag.outputs.tag }}
          name: Release ${{ steps.extract_tag.outputs.tag }}
          body: ${{ fromJSON(steps.release_notes.outputs.result).body }}
          draft: false
          prerelease: ${{ startsWith(steps.extract_tag.outputs.tag, 'dev') }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          target: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install

      - name: Build Universal Binary
        run: npm run build:mac

      - name: Build Apple Silicon Binary
        run: npm run build:mac-arm

      - name: Build Intel Binary
        run: npm run build:mac-intel

      - name: Prepare macOS Release Assets
        env:
          VERSION: ${{ needs.create-release.outputs.tag_name }}
        run: |
          mkdir -p release-assets/macos
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg "release-assets/macos/biji2md_${VERSION#v}_macos_universal.dmg"
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "release-assets/macos/biji2md_${VERSION#v}_macos_apple-silicon.dmg"
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg "release-assets/macos/biji2md_${VERSION#v}_macos_intel.dmg"

      - name: Upload macOS Installers
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: release-assets/macos/*.dmg

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run build:windows

      - name: Prepare Windows Release Assets
        env:
          VERSION: ${{ needs.create-release.outputs.tag_name }}
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/windows
          Copy-Item src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi "release-assets/windows/biji2md_$($env:VERSION.TrimStart('v'))_windows_x64.msi"

      - name: Upload Windows Installer
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: release-assets/windows/*.msi

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install dependencies
        run: npm install

      - name: Build Linux
        run: npm run build:linux

      - name: Prepare Linux Release Assets
        env:
          VERSION: ${{ needs.create-release.outputs.tag_name }}
        run: |
          mkdir -p release-assets/linux
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage "release-assets/linux/biji2md_${VERSION#v}_linux_x64.AppImage"
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb "release-assets/linux/biji2md_${VERSION#v}_linux_x64.deb"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: release-assets/linux/*
